input CreateMeetingInput {
  topic: String!
  type: MeetingType
  startTime: DateTime
  duration: Int
  scheduleFor: String
  timezone: String
  password: String
  agenda: String
  trackingFields: [TrackingFieldInput!]
  recurrence: RecurrenceInput
  settings: MeetingSettingsInput
