}

input UpdateMeetingInput {
  topic: String
  type: MeetingType
  startTime: DateTime
  duration: Int
  timezone: String
  password: String
  agenda: String
  trackingFields: [TrackingFieldInput!]
  recurrence: RecurrenceInput
  settings: MeetingSettingsInput
}

input MeetingSettingsInput {
  hostVideo: Boolean
  participantVideo: Boolean
  joinBeforeHost: Boolean
  muteUponEntry: Boolean
  watermark: Boolean
  usePmi: Boolean
