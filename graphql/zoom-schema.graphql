"""
Zoom GraphQL Schema — Conceptual
Derived from the Zoom REST API (https://developers.zoom.us/docs/api/).
No native public GraphQL endpoint exists for Zoom. This schema models the
Zoom data surface for use with GraphQL gateways, code generation, or API
design reference.
"""

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

scalar DateTime
scalar Date
scalar URL
scalar JSON

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

enum MeetingType {
  INSTANT
  SCHEDULED
  RECURRING_NO_FIXED_TIME
  RECURRING_FIXED_TIME
  PERSONAL_MEETING_ROOM
}

enum MeetingStatus {
  WAITING
  STARTED
  FINISHED
}

enum WebinarType {
  WEBINAR
  RECURRING_WEBINAR_NO_FIXED_TIME
  RECURRING_WEBINAR_FIXED_TIME
}

enum WebinarStatus {
  AVAILABLE
  UNAVAILABLE
  ENDED
}

enum UserStatus {
  ACTIVE
  INACTIVE
  PENDING
}

enum UserType {
  BASIC
  LICENSED
  ON_PREM
}

enum RecordingStatus {
  PROCESSING
  COMPLETED
  FAILED
}

enum RecordingFileType {
  MP4
  M4A
  TIMELINE
  TRANSCRIPT
  CHAT
  CC
  CSV
  SUMMARY
}

enum RegistrantStatus {
  PENDING
  APPROVED
  DENIED
}

enum ChatChannelType {
  PUBLIC_CHANNEL
  PRIVATE_CHANNEL
  DIRECT_MESSAGE
  GROUP_MESSAGE
  CONTACT_CENTER
}

enum ParticipantStatus {
  IN_MEETING
  IN_WAITING_ROOM
  LEFT
}

enum PollQuestionType {
  SINGLE_CHOICE
  MULTIPLE_CHOICE
  SHORT_ANSWER
  LONG_ANSWER
  RATING_SCALE
  RANKED_CHOICE
}

enum PollStatus {
  NOTSTART
  STARTED
  ENDED
  SHARING
}

enum ApprovalType {
  AUTOMATIC
  MANUAL
  NO_REGISTRATION
}

enum AudioType {
  BOTH
  TELEPHONY
  VOIP
  THIRD_PARTY
}

enum PhoneNumberType {
  MOBILE
  FAX
  WORK
  HOME
  DIRECT_NUMBER
}

enum BreakoutRoomStatus {
  OPEN
  CLOSED
}

enum PaneltistStatus {
  ACTIVE
  PENDING
}

enum InterpreterLanguage {
  US
  CN
  JP
  DE
  FR
  RU
  PT
  ES
  KO
  IT
  VI
  HI
  NL
  AR
  PL
}

enum SentimentType {
  POSITIVE
  NEGATIVE
  NEUTRAL
  MIXED
}

