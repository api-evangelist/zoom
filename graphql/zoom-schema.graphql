# ---------------------------------------------------------------------------
# Root Query Type
# ---------------------------------------------------------------------------

type Query {
  # Account
  account(accountId: ID!): Account
  accountSettings(accountId: ID!): AccountSettings

  # Users
  user(userId: ID!): User
  userByEmail(email: String!): User
  users(
    status: UserStatus
    pageSize: Int
    pageNumber: Int
    nextPageToken: String
    roleId: ID
    groupId: ID
  ): UserConnection

  # Groups
  group(groupId: ID!): Group
  groups: [Group!]

  # Contacts
  contact(contactId: ID!): Contact
  contacts(nextPageToken: String, pageSize: Int): [Contact!]

  # Meetings
  meeting(meetingId: ID!): Meeting
  meetings(
    userId: ID!
    type: String
    pageSize: Int
    nextPageToken: String
  ): MeetingConnection
  pastMeeting(meetingUuid: String!): Meeting
  pastMeetingParticipants(meetingUuid: String!, nextPageToken: String): ParticipantConnection
  meetingPoll(meetingId: ID!, pollId: ID!): Poll
  meetingPolls(meetingId: ID!): [Poll!]
  meetingRegistrants(meetingId: ID!, status: RegistrantStatus): RegistrantConnection
  meetingTemplates(userId: ID!): [MeetingTemplate!]

  # Webinars
  webinar(webinarId: ID!): Webinar
  webinars(userId: ID!, pageSize: Int, nextPageToken: String): [Webinar!]
  webinarRegistrants(webinarId: ID!, status: RegistrantStatus): RegistrantConnection
  webinarPanelists(webinarId: ID!): [Panelist!]
  webinarPolls(webinarId: ID!): [Poll!]
  webinarQA(webinarId: String!): [QA!]

  # Recordings
  cloudRecording(meetingId: ID!): CloudRecording
  cloudRecordingsByUser(
    userId: ID!
    from: Date
    to: Date
    nextPageToken: String
  ): CloudRecordingConnection
  recordingTranscript(meetingId: ID!): AudioTranscript

  # Chat
  chatChannel(channelId: ID!): ChatChannel
  chatChannels(userId: ID!, nextPageToken: String, pageSize: Int): [ChatChannel!]
  chatMessages(
    userId: ID!
    toContact: String
    toChannel: ID
    fromDate: DateTime
    toDate: DateTime
    nextPageToken: String
  ): ChatMessageConnection
  chatFiles(userId: ID!, nextPageToken: String): [File!]

  # Dashboard & Reports
  dashboardMeetings(from: Date!, to: Date!, nextPageToken: String): DashboardMeetingConnection
  dashboardWebinars(from: Date!, to: Date!, nextPageToken: String): DashboardWebinarConnection
  dashboardZoomRooms(nextPageToken: String): [DashboardZoomRoom!]
  reportDaily(userId: ID!, year: Int!, month: Int!): [DailyUsage!]
  reportMeetings(userId: ID!, from: Date!, to: Date!): [MeetingReport!]
  reportActivities(from: Date!, to: Date!, nextPageToken: String): [ActivityReport!]

  # Phone
  phoneNumber(phoneNumberId: ID!): PhoneNumber
  phoneNumbers(nextPageToken: String, pageSize: Int): [PhoneNumber!]
  sipPhone(sipPhoneId: ID!): SIPPhone
  sipPhones(userId: ID): [SIPPhone!]

  # AI
  meetingAI(meetingId: ID!): MeetingAI
  meetingAISummary(meetingId: ID!): MeetingAISummary

  # Virtual Backgrounds
  virtualBackgrounds(userId: ID!): [VirtualBackground!]
}

# ---------------------------------------------------------------------------
# Root Mutation Type
# ---------------------------------------------------------------------------

type Mutation {
  # Meetings
  createMeeting(userId: ID!, input: CreateMeetingInput!): Meeting
  updateMeeting(meetingId: ID!, input: UpdateMeetingInput!): Meeting
  deleteMeeting(meetingId: ID!): Boolean
  endMeeting(meetingId: ID!): Boolean
  addMeetingRegistrant(meetingId: ID!, input: RegistrantInput!): Registrant
  approveMeetingRegistrant(meetingId: ID!, registrantId: ID!): Registrant
  denyMeetingRegistrant(meetingId: ID!, registrantId: ID!): Registrant
  createMeetingPoll(meetingId: ID!, input: PollInput!): Poll
  updateMeetingPoll(meetingId: ID!, pollId: ID!, input: PollInput!): Poll
  deleteMeetingPoll(meetingId: ID!, pollId: ID!): Boolean
  updateMeetingLivestream(meetingId: ID!, input: LivestreamInput!): Livestream
  startMeetingLivestream(meetingId: ID!): Boolean

  # Webinars
  createWebinar(userId: ID!, input: CreateWebinarInput!): Webinar
  updateWebinar(webinarId: ID!, input: UpdateWebinarInput!): Webinar
  deleteWebinar(webinarId: ID!): Boolean
  addWebinarRegistrant(webinarId: ID!, input: RegistrantInput!): Registrant
  approveWebinarRegistrant(webinarId: ID!, registrantId: ID!): Registrant
  addWebinarPanelist(webinarId: ID!, input: PanelistInput!): Panelist
  removeWebinarPanelist(webinarId: ID!, panelistId: ID!): Boolean
  createWebinarPoll(webinarId: ID!, input: PollInput!): Poll

  # Users
  createUser(input: CreateUserInput!): User
  updateUser(userId: ID!, input: UpdateUserInput!): User
  deleteUser(userId: ID!, transferEmail: String): Boolean
  deactivateUser(userId: ID!): Boolean
  updateUserPassword(userId: ID!, password: String!): Boolean
  assignUserAssistants(userId: ID!, assistants: [AssistantInput!]!): [UserAssistant!]

  # Groups
  createGroup(name: String!): Group
  updateGroup(groupId: ID!, name: String!): Group
  deleteGroup(groupId: ID!): Boolean
  addGroupMembers(groupId: ID!, members: [ID!]!): Group
  removeGroupMember(groupId: ID!, memberId: ID!): Boolean

  # Recordings
  deleteCloudRecording(meetingId: ID!): Boolean
  deleteRecordingFile(meetingId: ID!, recordingId: ID!): Boolean
  recoverCloudRecording(meetingId: ID!): Boolean

  # Chat
  sendChatMessage(userId: ID!, input: ChatMessageInput!): ChatMessage
  deleteChatMessage(userId: ID!, messageId: ID!): Boolean
  createChatChannel(userId: ID!, input: ChatChannelInput!): ChatChannel
  updateChatChannel(channelId: ID!, input: ChatChannelInput!): ChatChannel
  deleteChatChannel(channelId: ID!): Boolean
  inviteChatChannelMembers(channelId: ID!, members: [ID!]!): Boolean
  removeChatChannelMember(channelId: ID!, memberId: ID!): Boolean

  # Phone
  assignPhoneNumber(userId: ID!, phoneNumberId: ID!): PhoneNumber
  unassignPhoneNumber(userId: ID!, phoneNumberId: ID!): Boolean
  addSIPPhone(input: SIPPhoneInput!): SIPPhone
  deleteSIPPhone(sipPhoneId: ID!): Boolean
}

