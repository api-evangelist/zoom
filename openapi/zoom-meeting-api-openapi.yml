    Poll:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Poll ID.
        title:
          type: string
          description: Poll title.
        anonymous:
          type: boolean
          description: Whether this is an anonymous poll.
        status:
          type: string
          description: Poll status.
          enum:
            - notstart
            - started
            - ended
            - sharing
        poll_type:
          type: integer
          description: >-
            Type of poll. 1 - Poll, 2 - Advanced Poll, 3 - Quiz.
          enum:
            - 1
            - 2
            - 3
        questions:
          type: array
          description: List of questions in the poll.
          items:
            $ref: '#/components/schemas/PollQuestion'
    PollQuestion:
      type: object
      properties:
        name:
          type: string
          description: Question text.
        type:
          type: string
          description: Question type.
          enum:
            - single
            - multiple
            - matching
            - rank_order
            - short_answer
            - long_answer
            - fill_in_the_blank
            - rating_scale
        answer_required:
          type: boolean
          description: Whether an answer is required.
        answers:
          type: array
          description: Available answer options.
          items:
            type: string
        right_answers:
          type: array
          description: Correct answers for quiz type polls.
          items:
            type: string
        prompts:
          type: array
          description: Prompts for matching and rank order question types.
          items:
            type: object
            properties:
              prompt_question:
                type: string
              prompt_right_answers:
                type: array
                items:
                  type: string
        rating_min_value:
          type: integer
          description: Minimum rating value for rating scale questions.
        rating_max_value:
          type: integer
          description: Maximum rating value for rating scale questions.
        rating_min_label:
          type: string
          description: Label for minimum rating value.
        rating_max_label:
          type: string
          description: Label for maximum rating value.
        answer_min_character:
          type: integer
          description: Minimum characters for short/long answer questions.
        answer_max_character:
          type: integer
          description: Maximum characters for short/long answer questions.
    PollCreateRequest:
      type: object
      properties:
        title:
          type: string
          description: Poll title. Maximum 64 characters.
          maxLength: 64
        anonymous:
          type: boolean
          description: Whether this is an anonymous poll.
          default: false
        poll_type:
          type: integer
          description: >-
            Type of poll. 1 - Poll, 2 - Advanced Poll, 3 - Quiz.
          enum:
            - 1
            - 2
            - 3
          default: 1
        questions:
          type: array
          description: List of questions for the poll.
          items:
            $ref: '#/components/schemas/PollQuestion'
    ParticipantList:
      type: object
      properties:
        page_count:
          type: integer
        page_size:
          type: integer
        total_records:
          type: integer
        next_page_token:
          type: string
        participants:
          type: array
          items:
            $ref: '#/components/schemas/Participant'
    Participant:
      type: object
      properties:
        id:
          type: string
          description: Participant UUID.
        user_id:
          type: string
          description: Participant user ID if the participant is a Zoom user.
        name:
          type: string
          description: Participant display name.
        user_email:
          type: string
          format: email
          description: Participant email address.
        join_time:
          type: string
          format: date-time
          description: Time the participant joined the meeting.
        leave_time:
          type: string
          format: date-time
