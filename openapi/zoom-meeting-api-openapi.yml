openapi: 3.1.0
info:
  title: Zoom Meeting API
  description: >-
    The Zoom Meeting API lets developers access meeting data from the Zoom
    platform. Use this API to create, read, update, and delete meetings, manage
    participants, registrants, polls, and live streams. Build private services
    or public applications on the Zoom App Marketplace.
  version: 2.0.0
  contact:
    name: Zoom Developer Support
    url: https://developers.zoom.us
    email: developer-support@zoom.us
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  termsOfService: https://explore.zoom.us/en/terms/
  x-logo:
    url: https://st1.zoom.us/static/5.16.6-1642/image/new/ZoomLogo.png
    altText: Zoom Logo
externalDocs:
  description: Zoom Meeting API Documentation
  url: https://developers.zoom.us/docs/api/rest/meeting/
servers:
- url: https://api.zoom.us/v2
  description: Zoom REST API v2 Production
security:
- oauth2: []
- bearerAuth: []
tags:
- name: Meeting Live Stream
  description: Manage live streaming for Zoom meetings.
- name: Meeting Participants
  description: Manage participants in Zoom meetings.
- name: Meeting Polls
  description: Create and manage polls for Zoom meetings.
- name: Meeting Recordings
  description: Access and manage meeting recordings.
- name: Meeting Registrants
  description: Manage meeting registration and registrants.
- name: Meetings
  description: Create and manage Zoom meetings.
  externalDocs:
    url: https://developers.zoom.us/docs/api/rest/reference/zoom-api/methods/#tag/Meetings
paths:
  /users/{userId}/meetings:
    get:
      tags:
      - Meetings
      summary: Zoom List Meetings
      description: >-
        List all the meetings that were scheduled for a user. For user-level
        apps, pass the `me` value instead of the userId parameter.
      operationId: listMeetings
      parameters:
      - $ref: '#/components/parameters/UserIdPath'
      - name: type
        in: query
        description: >-
          The type of meeting. `scheduled` - All valid previous (unexpired)
          meetings, live meetings, and upcoming scheduled meetings.
          `live` - All the ongoing meetings.
          `upcoming` - All upcoming meetings including live meetings.
          `upcoming_meetings` - All upcoming meetings including live meetings.
          `previous_meetings` - All the previous meetings.
        schema:
          type: string
          enum:
          - scheduled
          - live
          - upcoming
          - upcoming_meetings
          - previous_meetings
          default: scheduled
        example: scheduled
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/NextPageToken'
      - $ref: '#/components/parameters/PageNumber'
      responses:
        '200':
          description: Successfully retrieved the list of meetings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingList'
              examples:
                Listmeetings200Example:
                  summary: Default listMeetings 200 response
                  x-microcks-default: true
                  value:
                    page_count: 10
                    page_number: 10
                    page_size: 10
                    total_records: 10
                    next_page_token: example_value
                    meetings:
                    - uuid: '500123'
                      id: abc123
                      host_id: '500123'
                      topic: example_value
                      start_time: '2026-01-15T10:30:00Z'
                      duration: 10
                      timezone: example_value
                      created_at: '2026-01-15T10:30:00Z'
                      join_url: https://www.example.com
                      agenda: example_value
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      tags:
      - Meetings
      summary: Zoom Create a Meeting
      description: >-
        Create a meeting for a user. For user-level apps, pass the `me` value
        instead of the userId parameter. A meeting can be scheduled, instant,
        or recurring.
      operationId: createMeeting
      parameters:
      - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingCreateRequest'
            examples:
              CreatemeetingRequestExample:
                summary: Default createMeeting request
                x-microcks-default: true
                value:
                  topic: example_value
                  type: 1
                  pre_schedule: true
                  start_time: '2026-01-15T10:30:00Z'
                  duration: 10
                  schedule_for: example_value
                  timezone: example_value
                  password: example_value
                  default_password: true
                  agenda: example_value
                  tracking_fields:
                  - field: example_value
                    value: example_value
                  recurrence:
                    type: 1
                    repeat_interval: 10
                    weekly_days: example_value
                    monthly_day: 10
                    monthly_week: -1
                    monthly_week_day: 1
                    end_times: 10
                    end_date_time: '2026-01-15T10:30:00Z'
                  settings:
                    host_video: true
                    participant_video: true
                    cn_meeting: true
                    in_meeting: true
                    join_before_host: true
                    jbh_time: 0
                    mute_upon_entry: true
                    watermark: true
                    use_pmi: true
                    approval_type: 0
                    registration_type: 1
                    audio: both
                    auto_recording: local
                    enforce_login: true
                    enforce_login_domains: example_value
                    alternative_hosts: example_value
                    alternative_hosts_email_notification: user@example.com
                    close_registration: true
                    waiting_room: true
                    global_dial_in_countries:
                    - {}
                    contact_name: example_value
                    contact_email: user@example.com
                    registrants_email_notification: user@example.com
                    registrants_confirmation_email: user@example.com
                    meeting_authentication: true
                    authentication_option: example_value
                    authentication_domains: example_value
                    authentication_name: example_value
                    show_share_button: true
                    allow_multiple_devices: true
                    encryption_type: enhanced_encryption
                    approved_or_denied_countries_or_regions:
                      enable: true
                      method: approve
                      approved_list: {}
                      denied_list: {}
                    breakout_room:
                      enable: true
                      rooms: {}
                    language_interpretation:
                      enable: true
                      interpreters: {}
                    focus_mode: true
                    meeting_invitees:
                    - {}
                    private_meeting: true
                    email_notification: user@example.com
                    host_save_video_order: true
                    continuous_meeting_chat:
                      enable: true
                      auto_add_invited_external_users: true
                  template_id: '500123'
      responses:
        '201':
          description: Meeting created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingCreateResponse'
              examples:
                Createmeeting201Example:
                  summary: Default createMeeting 201 response
                  x-microcks-default: true
                  value:
                    uuid: '500123'
                    id: abc123
                    host_id: '500123'
                    host_email: user@example.com
                    topic: example_value
                    type: 1
                    status: waiting
                    start_time: '2026-01-15T10:30:00Z'
                    duration: 10
                    timezone: example_value
                    agenda: example_value
                    created_at: '2026-01-15T10:30:00Z'
                    start_url: https://www.example.com
                    join_url: https://www.example.com
                    password: example_value
                    h323_password: example_value
                    pstn_password: example_value
                    encrypted_password: example_value
                    settings:
                      host_video: true
                      participant_video: true
                      cn_meeting: true
                      in_meeting: true
                      join_before_host: true
                      jbh_time: 0
                      mute_upon_entry: true
                      watermark: true
                      use_pmi: true
                      approval_type: 0
                      registration_type: 1
                      audio: both
                      auto_recording: local
                      enforce_login: true
                      enforce_login_domains: example_value
                      alternative_hosts: example_value
                      alternative_hosts_email_notification: user@example.com
                      close_registration: true
                      waiting_room: true
                      global_dial_in_countries:
                      - {}
                      contact_name: example_value
                      contact_email: user@example.com
                      registrants_email_notification: user@example.com
                      registrants_confirmation_email: user@example.com
                      meeting_authentication: true
                      authentication_option: example_value
                      authentication_domains: example_value
                      authentication_name: example_value
                      show_share_button: true
                      allow_multiple_devices: true
                      encryption_type: enhanced_encryption
                      approved_or_denied_countries_or_regions:
                        enable: true
                        method: approve
                        approved_list: {}
                        denied_list: {}
                      breakout_room:
                        enable: true
                        rooms: {}
                      language_interpretation:
                        enable: true
                        interpreters: {}
                      focus_mode: true
                      meeting_invitees:
                      - {}
                      private_meeting: true
                      email_notification: user@example.com
                      host_save_video_order: true
                      continuous_meeting_chat:
                        enable: true
                        auto_add_invited_external_users: true
                    recurrence:
                      type: 1
                      repeat_interval: 10
                      weekly_days: example_value
                      monthly_day: 10
                      monthly_week: -1
                      monthly_week_day: 1
                      end_times: 10
                      end_date_time: '2026-01-15T10:30:00Z'
                    occurrences:
                    - occurrence_id: '500123'
                      start_time: '2026-01-15T10:30:00Z'
                      duration: 10
                      status: available
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /meetings/{meetingId}:
    get:
      tags:
      - Meetings
      summary: Zoom Get Meeting Details
      description: >-
        Retrieve the details of a meeting. This returns detailed information
        about the specified meeting including settings, recurrence, and
        tracking fields.
      operationId: getMeeting
      parameters:
      - $ref: '#/components/parameters/MeetingIdPath'
      - name: occurrence_id
        in: query
        description: Meeting occurrence ID for recurring meetings.
        schema:
          type: string
        example: '500123'
      - name: show_previous_occurrences
        in: query
        description: >-
          Set to true to view meeting details of all previous occurrences
          of a recurring meeting.
        schema:
          type: boolean
          default: false
        example: true
      responses:
        '200':
          description: Successfully retrieved meeting details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingDetails'
              examples:
                Getmeeting200Example:
                  summary: Default getMeeting 200 response
                  x-microcks-default: true
                  value: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    patch:
      tags:
      - Meetings
      summary: Zoom Update a Meeting
      description: >-
        Update the details of a meeting. This can include topic, start time,
        duration, settings, and other meeting options.
      operationId: updateMeeting
      parameters:
      - $ref: '#/components/parameters/MeetingIdPath'
      - name: occurrence_id
        in: query
        description: Meeting occurrence ID for recurring meeting updates.
        schema:
          type: string
        example: '500123'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingUpdateRequest'
            examples:
              UpdatemeetingRequestExample:
                summary: Default updateMeeting request
                x-microcks-default: true
                value:
                  topic: example_value
                  type: 1
                  start_time: '2026-01-15T10:30:00Z'
                  duration: 10
                  schedule_for: example_value
                  timezone: example_value
                  password: example_value
                  agenda: example_value
                  recurrence:
                    type: 1
                    repeat_interval: 10
                    weekly_days: example_value
                    monthly_day: 10
                    monthly_week: -1
                    monthly_week_day: 1
                    end_times: 10
                    end_date_time: '2026-01-15T10:30:00Z'
                  settings:
                    host_video: true
                    participant_video: true
                    cn_meeting: true
                    in_meeting: true
                    join_before_host: true
                    jbh_time: 0
                    mute_upon_entry: true
                    watermark: true
                    use_pmi: true
                    approval_type: 0
                    registration_type: 1
                    audio: both
                    auto_recording: local
                    enforce_login: true
                    enforce_login_domains: example_value
                    alternative_hosts: example_value
                    alternative_hosts_email_notification: user@example.com
                    close_registration: true
                    waiting_room: true
                    global_dial_in_countries:
                    - {}
                    contact_name: example_value
                    contact_email: user@example.com
                    registrants_email_notification: user@example.com
                    registrants_confirmation_email: user@example.com
                    meeting_authentication: true
                    authentication_option: example_value
                    authentication_domains: example_value
                    authentication_name: example_value
                    show_share_button: true
                    allow_multiple_devices: true
                    encryption_type: enhanced_encryption
                    approved_or_denied_countries_or_regions:
                      enable: true
                      method: approve
                      approved_list: {}
                      denied_list: {}
                    breakout_room:
                      enable: true
                      rooms: {}
                    language_interpretation:
                      enable: true
                      interpreters: {}
                    focus_mode: true
                    meeting_invitees:
                    - {}
                    private_meeting: true
                    email_notification: user@example.com
                    host_save_video_order: true
                    continuous_meeting_chat:
                      enable: true
                      auto_add_invited_external_users: true
                  tracking_fields:
                  - field: example_value
                    value: example_value
      responses:
        '204':
          description: Meeting updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      tags:
      - Meetings
      summary: Zoom Delete a Meeting
      description: >-
        Delete a meeting. This permanently removes the meeting from Zoom.
      operationId: deleteMeeting
      parameters:
      - $ref: '#/components/parameters/MeetingIdPath'
      - name: occurrence_id
        in: query
        description: Meeting occurrence ID for recurring meeting deletion.
        schema:
          type: string
        example: '500123'
      - name: schedule_for_reminder
        in: query
        description: >-
          Notify host and alternative host about the meeting cancellation
          via email.
        schema:
          type: boolean
          default: true
        example: true
      - name: cancel_meeting_reminder
        in: query
        description: >-
          Notify registrants about the meeting cancellation via email.
        schema:
          type: boolean
          default: false
        example: true
      responses:
        '204':
          description: Meeting deleted successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /meetings/{meetingId}/status:
    put:
      tags:
      - Meetings
      summary: Zoom Update Meeting Status
      description: >-
        End a meeting by updating its status. This can also recover a
        deleted meeting within a certain time frame.
      operationId: updateMeetingStatus
      parameters:
      - $ref: '#/components/parameters/MeetingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  description: >-
                    The action to take. `end` - End the meeting.
                    `recover` - Recover a deleted meeting.
                  enum:
                  - end
                  - recover
            examples:
              UpdatemeetingstatusRequestExample:
                summary: Default updateMeetingStatus request
                x-microcks-default: true
                value:
                  action: end
      responses:
        '204':
          description: Meeting status updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /meetings/{meetingId}/registrants:
    get:
      tags:
      - Meeting Registrants
      summary: Zoom List Meeting Registrants
      description: >-
        List all registrants for a meeting. Returns the list of users who
        registered for the meeting.
      operationId: listMeetingRegistrants
      parameters:
      - $ref: '#/components/parameters/MeetingIdPath'
      - name: occurrence_id
        in: query
        description: Meeting occurrence ID for recurring meetings.
        schema:
          type: string
        example: '500123'
      - name: status
        in: query
        description: Registrant status filter.
        schema:
          type: string
          enum:
          - pending
          - approved
          - denied
          default: approved
        example: pending
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/NextPageToken'
      responses:
        '200':
          description: Successfully retrieved the list of registrants.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrantList'
              examples:
                Listmeetingregistrants200Example:
                  summary: Default listMeetingRegistrants 200 response
                  x-microcks-default: true
                  value:
                    page_count: 10
                    page_number: 10
                    page_size: 10
                    total_records: 10
                    next_page_token: example_value
                    registrants:
                    - id: abc123
                      email: user@example.com
                      first_name: example_value
                      last_name: example_value
                      address: example_value
                      city: example_value
                      state: example_value
                      zip: example_value
                      country: example_value
                      phone: example_value
                      industry: example_value
                      org: example_value
                      job_title: example_value
                      purchasing_time_frame: example_value
                      role_in_purchase_process: example_value
                      no_of_employees: example_value
                      comments: example_value
                      status: approved
                      create_time: '2026-01-15T10:30:00Z'
                      join_url: https://www.example.com
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      tags:
      - Meeting Registrants
      summary: Zoom Add a Meeting Registrant
      description: >-
        Register a participant for a meeting. A host or alternative host can
        also add registrants on behalf of other users.
      operationId: addMeetingRegistrant
      parameters:
      - $ref: '#/components/parameters/MeetingIdPath'
      - name: occurrence_ids
        in: query
        description: >-
          A comma-separated list of occurrence IDs for recurring meetings.
        schema:
          type: string
        example: example_value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrantCreateRequest'
            examples:
              AddmeetingregistrantRequestExample:
                summary: Default addMeetingRegistrant request
                x-microcks-default: true
                value:
                  email: user@example.com
                  first_name: example_value
                  last_name: example_value
                  address: example_value
                  city: example_value
                  state: example_value
                  zip: example_value
                  country: example_value
                  phone: example_value
                  comments: example_value
                  industry: example_value
                  job_title: example_value
                  org: example_value
                  no_of_employees: '1-20'
                  purchasing_time_frame: Within a month
                  role_in_purchase_process: Decision Maker
                  language: en-US
                  custom_questions:
                  - title: Example Title
                    value: example_value
                  auto_approve: true
      responses:
        '201':
          description: Registrant added successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrantCreateResponse'
              examples:
                Addmeetingregistrant201Example:
                  summary: Default addMeetingRegistrant 201 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    registrant_id: '500123'
                    start_time: '2026-01-15T10:30:00Z'
                    topic: example_value
                    join_url: https://www.example.com
                    participant_pin_code: 10
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /meetings/{meetingId}/registrants/status:
    put:
      tags:
      - Meeting Registrants
      summary: Zoom Update Registrant Status
      description: >-
        Approve or deny a meeting registrant. Also allows cancellation of
        a previously approved registrant.
      operationId: updateMeetingRegistrantStatus
      parameters:
      - $ref: '#/components/parameters/MeetingIdPath'
      - name: occurrence_id
        in: query
        description: Meeting occurrence ID for recurring meetings.
        schema:
          type: string
        example: '500123'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - action
              properties:
                action:
                  type: string
                  description: Action to take on registrants.
                  enum:
                  - approve
                  - deny
                  - cancel
                registrants:
                  type: array
                  description: List of registrants to update.
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Registrant ID.
                      email:
                        type: string
                        description: Registrant email address.
            examples:
              UpdatemeetingregistrantstatusRequestExample:
                summary: Default updateMeetingRegistrantStatus request
                x-microcks-default: true
                value:
                  action: approve
                  registrants:
                  - id: abc123
                    email: user@example.com
      responses:
        '204':
          description: Registrant status updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /meetings/{meetingId}/polls:
    get:
      tags:
      - Meeting Polls
      summary: Zoom List Meeting Polls
      description: List all polls for a meeting.
      operationId: listMeetingPolls
      parameters:
      - $ref: '#/components/parameters/MeetingIdPath'
      - name: anonymous
        in: query
        description: Whether to query anonymous polls.
        schema:
          type: boolean
        example: true
      responses:
        '200':
          description: Successfully retrieved meeting polls.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_records:
                    type: integer
                    description: Total number of polls.
                  polls:
                    type: array
                    items:
                      $ref: '#/components/schemas/Poll'
              examples:
                Listmeetingpolls200Example:
                  summary: Default listMeetingPolls 200 response
                  x-microcks-default: true
                  value:
                    total_records: 10
                    polls:
                    - id: abc123
                      title: Example Title
                      anonymous: true
                      status: notstart
                      poll_type: 1
                      questions:
                      - {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      tags:
      - Meeting Polls
      summary: Zoom Create a Meeting Poll
      description: >-
        Create a poll for a meeting. Meeting must be a scheduled meeting.
        Instant meetings do not have polling features enabled.
      operationId: createMeetingPoll
      parameters:
      - $ref: '#/components/parameters/MeetingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PollCreateRequest'
            examples:
              CreatemeetingpollRequestExample:
                summary: Default createMeetingPoll request
                x-microcks-default: true
                value:
                  title: Example Title
                  anonymous: true
                  poll_type: 1
                  questions:
                  - name: Example Title
                    type: single
                    answer_required: true
                    answers: {}
                    right_answers: {}
                    prompts: {}
                    rating_min_value: 10
                    rating_max_value: 10
                    rating_min_label: example_value
                    rating_max_label: example_value
                    answer_min_character: 10
                    answer_max_character: 10
      responses:
        '201':
          description: Poll created successfully.
          content:
            application/json:
              schema:
