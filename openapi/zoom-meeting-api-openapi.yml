    MeetingSettings:
      type: object
      description: Meeting settings and options.
      properties:
        host_video:
          type: boolean
          description: Start video when the host joins the meeting.
          default: true
          example: true
        participant_video:
          type: boolean
          description: Start video when participants join the meeting.
          example: true
        cn_meeting:
          type: boolean
          description: Host meeting in China.
          default: false
          example: true
        in_meeting:
          type: boolean
          description: Host meeting in India.
          default: false
          example: true
        join_before_host:
          type: boolean
          description: Allow participants to join before the host.
          default: false
          example: true
        jbh_time:
          type: integer
          description: >-
            Minutes before the host joins that participants can join.
            0 - any time, 5 - 5 minutes, 10 - 10 minutes.
          enum:
          - 0
          - 5
          - 10
          example: 0
        mute_upon_entry:
          type: boolean
          description: Mute participants upon entry.
          default: false
          example: true
        watermark:
          type: boolean
          description: Add watermark when viewing a shared screen.
          default: false
          example: true
        use_pmi:
          type: boolean
          description: Use Personal Meeting ID instead of generated meeting ID.
          default: false
          example: true
        approval_type:
          type: integer
          description: >-
            Registration approval type. 0 - Automatically approve,
            1 - Manually approve, 2 - No registration required.
          enum:
          - 0
          - 1
          - 2
          default: 2
          example: 0
        registration_type:
          type: integer
          description: >-
            Registration type for recurring meetings. 1 - Register once
            and attend any, 2 - Register for each, 3 - Register once
            and choose occurrences.
          enum:
          - 1
          - 2
          - 3
          default: 1
          example: 1
        audio:
          type: string
          description: Determine how participants can join the meeting audio.
          enum:
          - both
          - telephony
          - voip
          - thirdParty
          default: both
          example: both
        auto_recording:
          type: string
          description: Automatic recording configuration.
          enum:
          - local
          - cloud
          - none
          default: none
          example: local
        enforce_login:
          type: boolean
          description: Only authenticated users can join the meeting.
          default: false
          example: true
        enforce_login_domains:
          type: string
          description: >-
            Only users with specific email domain(s) can join. Comma
            separated for multiple domains.
          example: example_value
        alternative_hosts:
          type: string
          description: >-
            Alternative host email addresses. Comma separated for multiple
            alternative hosts.
          example: example_value
        alternative_hosts_email_notification:
          type: boolean
          description: Send email notification to alternative hosts.
          default: true
          example: user@example.com
        close_registration:
          type: boolean
          description: Close registration after event date.
          default: false
          example: true
        waiting_room:
          type: boolean
          description: Enable the waiting room.
          default: false
          example: true
        global_dial_in_countries:
          type: array
          description: List of countries for global dial-in numbers.
          items:
            type: string
          example: []
        contact_name:
          type: string
          description: Contact name for meeting registration.
          example: example_value
        contact_email:
          type: string
          format: email
          description: Contact email for meeting registration.
          example: user@example.com
        registrants_email_notification:
          type: boolean
          description: Send email notifications to registrants.
          default: true
          example: user@example.com
        registrants_confirmation_email:
          type: boolean
          description: Send confirmation email to registrants.
          default: true
          example: user@example.com
        meeting_authentication:
          type: boolean
          description: Require authentication to join.
          default: false
          example: true
        authentication_option:
          type: string
          description: Meeting authentication option ID.
          example: example_value
        authentication_domains:
          type: string
          description: Allowed authentication domains.
          example: example_value
        authentication_name:
          type: string
          description: Authentication name set in the authentication profile.
          example: example_value
        show_share_button:
          type: boolean
          description: Show social share buttons on the registration page.
          example: true
        allow_multiple_devices:
          type: boolean
          description: Allow attendees to join from multiple devices.
          example: true
        encryption_type:
          type: string
          description: Meeting encryption type.
          enum:
          - enhanced_encryption
          - e2ee
          default: enhanced_encryption
          example: enhanced_encryption
        approved_or_denied_countries_or_regions:
          type: object
          description: Approve or block users from specific countries.
          properties:
            enable:
              type: boolean
            method:
              type: string
              enum:
              - approve
              - deny
            approved_list:
              type: array
              items:
                type: string
            denied_list:
              type: array
              items:
                type: string
          example: example_value
        breakout_room:
          type: object
          description: Breakout room settings.
          properties:
            enable:
              type: boolean
              description: Enable breakout rooms.
            rooms:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: Breakout room name.
                  participants:
                    type: array
                    description: Email addresses of participants.
                    items:
                      type: string
          example: example_value
        language_interpretation:
          type: object
          description: Language interpretation settings.
          properties:
            enable:
              type: boolean
            interpreters:
              type: array
              items:
                type: object
                properties:
                  email:
                    type: string
                    format: email
                  languages:
                    type: string
                    description: Comma separated language codes.
          example: example_value
        focus_mode:
          type: boolean
          description: Enable focus mode.
          example: true
        meeting_invitees:
          type: array
          description: List of users invited to the meeting.
          items:
            type: object
            properties:
              email:
                type: string
                format: email
          example: []
        private_meeting:
          type: boolean
          description: Make the meeting private.
          default: false
          example: true
        email_notification:
          type: boolean
          description: Send email notification when meeting starts.
          default: true
          example: user@example.com
        host_save_video_order:
          type: boolean
          description: >-
            Allow host to save the order of gallery view.
          example: true
        continuous_meeting_chat:
          type: object
          description: Continuous meeting chat settings.
          properties:
            enable:
              type: boolean
            auto_add_invited_external_users:
              type: boolean
          example: example_value
    Recurrence:
      type: object
      description: Recurrence settings for recurring meetings.
      properties:
        type:
          type: integer
          description: >-
            Recurrence type. 1 - Daily, 2 - Weekly, 3 - Monthly.
          enum:
          - 1
          - 2
          - 3
          example: 1
        repeat_interval:
          type: integer
          description: >-
            Interval at which the meeting recurs. For daily, max 90.
            For weekly, max 12. For monthly, max 3.
          example: 10
        weekly_days:
          type: string
          description: >-
            Days of the week for weekly recurrence. 1-Sunday through
            7-Saturday. Comma separated for multiple days.
          example: example_value
        monthly_day:
          type: integer
          description: Day of the month for monthly recurrence (1-31).
          example: 10
        monthly_week:
          type: integer
          description: >-
            Week of the month for monthly recurrence.
            -1 - Last week, 1 - First, 2 - Second, 3 - Third, 4 - Fourth.
          enum:
          - -1
          - 1
          - 2
          - 3
          - 4
          example: -1
        monthly_week_day:
          type: integer
          description: Day of the week for monthly recurrence. 1-Sunday through 7-Saturday.
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 7
          example: 1
        end_times:
          type: integer
          description: >-
            Number of times the meeting will recur before ending. Cannot
            be used with end_date_time. Maximum 365 for daily, 99 for weekly
            and monthly.
          maximum: 365
          default: 1
          example: 10
        end_date_time:
          type: string
          format: date-time
          description: >-
            The end date-time for the recurrence. Cannot be used with
            end_times.
          example: '2026-01-15T10:30:00Z'
