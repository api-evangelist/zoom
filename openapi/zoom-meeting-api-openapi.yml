          description: Registrant language preference.
          enum:
            - en-US
            - en
            - zh-CN
            - zh
            - es
            - fr-FR
            - fr
            - jp
            - pt
            - de
            - ko
            - it
            - vi
            - pl
            - tr
            - id
            - nl
            - ru
            - uk
            - sv
        custom_questions:
          type: array
          description: Custom question responses.
          items:
            type: object
            properties:
              title:
                type: string
                description: Question title.
              value:
                type: string
                description: Answer to the question.
        auto_approve:
          type: boolean
          description: Auto-approve this registrant.
    RegistrantCreateResponse:
      type: object
