components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: >-
        Zoom uses OAuth 2.0 for authentication. Server-to-Server OAuth and
        standard OAuth apps are supported.
      flows:
        authorizationCode:
          authorizationUrl: https://zoom.us/oauth/authorize
          tokenUrl: https://zoom.us/oauth/token
          scopes:
            meeting:read:meeting:admin: Read meeting details (admin)
            meeting:read:meeting:master: Read meeting details (master)
            meeting:write:meeting:admin: Write meeting details (admin)
            meeting:write:meeting:master: Write meeting details (master)
            meeting:read:list_meetings:admin: List meetings (admin)
            meeting:write:meeting: Create and update meetings
            meeting:read:meeting: Read meeting details
            meeting:delete:meeting: Delete meetings
            meeting:read:list_registrants:admin: List registrants (admin)
            meeting:write:registrant:admin: Add registrants (admin)
            meeting:update:registrant:admin: Update registrant status (admin)
            meeting:read:poll:admin: Read meeting polls (admin)
            meeting:write:poll:admin: Write meeting polls (admin)
            meeting:delete:poll:admin: Delete meeting polls (admin)
            meeting:read:participant:admin: Read meeting participants (admin)
            meeting:read:list_past_participants:admin: List past meeting participants (admin)
            meeting:read:invitation:admin: Read meeting invitation (admin)
            meeting:update:livestream:admin: Update live stream (admin)
            cloud_recording:read:list_recording_files:admin: Read recording files (admin)
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Bearer token obtained from OAuth 2.0 Server-to-Server or standard
        OAuth flow.
  parameters:
    UserIdPath:
      name: userId
      in: path
      required: true
      description: >-
        The user ID or email address. Use `me` for the current user in
        user-level apps.
      schema:
        type: string
        examples:
        - me
        - jchill@example.com
        - AbCdEfGhIjKlMnOpQrStUv
    MeetingIdPath:
      name: meetingId
      in: path
      required: true
      description: >-
        The meeting ID. This can be the meeting number (e.g., 85746065) or
        the meeting UUID.
      schema:
        oneOf:
        - type: integer
          format: int64
        - type: string
    PollIdPath:
      name: pollId
      in: path
      required: true
      description: The poll ID.
      schema:
        type: integer
        format: int64
    PageSize:
      name: page_size
      in: query
      description: The number of records returned per API call. Maximum is 300.
      schema:
        type: integer
        minimum: 1
        maximum: 300
        default: 30
    PageNumber:
      name: page_number
      in: query
      description: The page number of the current results.
      schema:
        type: integer
        default: 1
    NextPageToken:
      name: next_page_token
      in: query
      description: >-
        The next page token to paginate through large result sets. A
        next_page_token is returned in the response when a result set
        exceeds the page_size.
      schema:
        type: string
  schemas:
    MeetingList:
      type: object
      properties:
        page_count:
          type: integer
          description: Total number of pages.
          example: 10
        page_number:
          type: integer
          description: Current page number.
          example: 10
        page_size:
          type: integer
          description: Number of records per page.
          example: 10
        total_records:
          type: integer
          description: Total number of meeting records.
          example: 10
        next_page_token:
          type: string
          description: Token for the next page of results.
          example: example_value
        meetings:
          type: array
          description: List of meeting objects.
          items:
            $ref: '#/components/schemas/MeetingSummary'
          example: []
    MeetingSummary:
      type: object
      properties:
        uuid:
          type: string
          description: Unique meeting instance ID.
          example: '500123'
        id:
          type: integer
          format: int64
          description: Meeting ID (meeting number).
          example: abc123
        host_id:
          type: string
          description: ID of the user who is the meeting host.
          example: '500123'
        topic:
          type: string
          description: Meeting topic.
          example: example_value
        type:
          $ref: '#/components/schemas/MeetingType'
        start_time:
          type: string
          format: date-time
          description: Meeting start time in UTC.
          example: '2026-01-15T10:30:00Z'
        duration:
          type: integer
          description: Meeting duration in minutes.
          example: 10
        timezone:
          type: string
          description: Timezone for the meeting start time.
          example: example_value
        created_at:
          type: string
          format: date-time
          description: Time the meeting was created.
          example: '2026-01-15T10:30:00Z'
        join_url:
          type: string
          format: uri
          description: URL for participants to join the meeting.
          example: https://www.example.com
        agenda:
          type: string
          description: Meeting agenda or description.
          example: example_value
    MeetingType:
      type: integer
      description: >-
        Meeting type: 1 - Instant meeting, 2 - Scheduled meeting,
        3 - Recurring meeting with no fixed time,
        8 - Recurring meeting with a fixed time.
      enum:
      - 1
      - 2
      - 3
      - 8
    MeetingCreateRequest:
      type: object
      properties:
        topic:
          type: string
          description: Meeting topic. Maximum 200 characters.
          maxLength: 200
          example: example_value
        type:
          $ref: '#/components/schemas/MeetingType'
        pre_schedule:
          type: boolean
          description: Whether to create a pre-scheduled meeting.
          default: false
          example: true
        start_time:
          type: string
          format: date-time
          description: >-
            Meeting start time. Only used for scheduled meetings (type 2)
            and recurring meetings with a fixed time (type 8). Use UTC
            format such as 2023-11-25T12:00:00Z.
          example: '2026-01-15T10:30:00Z'
        duration:
          type: integer
          description: Meeting duration in minutes. Used for scheduled meetings only.
          example: 10
        schedule_for:
          type: string
