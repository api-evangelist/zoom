naftiko: 1.0.0-alpha2
info:
  label: Zoom Meeting Management
  description: Unified workflow for managing the complete Zoom meeting lifecycle including scheduling, registrants, polls,
    participants, recordings, and live streaming. Used by meeting organizers, administrators, and automation tools.
  tags:
  - Zoom
  - Meetings
  - Video Conferencing
  - Collaboration
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    ZOOM_OAUTH_TOKEN: ZOOM_OAUTH_TOKEN
capability:
  consumes:
  - type: http
    namespace: zoom-meeting
    baseUri: https://api.zoom.us/v2
    description: Zoom Meeting REST API for managing meetings, registrants, polls, participants, live streams, and recordings.
    authentication:
      type: bearer
      token: '{{ZOOM_OAUTH_TOKEN}}'
    resources:
    - name: meetings
      path: /users/{userId}/meetings
      description: Meeting lifecycle operations for a user.
      operations:
      - name: list-meetings
        method: GET
        description: List all meetings scheduled for a user.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
          description: The user ID or email address. Use 'me' for the current user.
        - name: type
          in: query
          type: string
          required: false
          description: 'Meeting type filter: scheduled, live, upcoming, previous_meetings.'
        - name: page_size
          in: query
          type: integer
          required: false
          description: Number of records per page.
        - name: next_page_token
          in: query
          type: string
          required: false
          description: Token for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-meeting
        method: POST
        description: Create a new meeting for a user.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
          description: The user ID or email address.
        body:
          type: json
          data:
            topic: '{{tools.topic}}'
            type: '{{tools.type}}'
            start_time: '{{tools.start_time}}'
            duration: '{{tools.duration}}'
            timezone: '{{tools.timezone}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: meeting-details
      path: /meetings/{meetingId}
      description: Single meeting operations.
      operations:
      - name: get-meeting
        method: GET
        description: Retrieve details of a specific meeting.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
          description: The meeting ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-meeting
        method: PATCH
        description: Update meeting details.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
          description: The meeting ID.
        body:
          type: json
          data:
            topic: '{{tools.topic}}'
            start_time: '{{tools.start_time}}'
            duration: '{{tools.duration}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-meeting
        method: DELETE
        description: Delete a meeting permanently.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
          description: The meeting ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: meeting-registrants
      path: /meetings/{meetingId}/registrants
      description: Manage meeting registrants.
      operations:
      - name: list-meeting-registrants
        method: GET
        description: List all registrants for a meeting.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
          description: The meeting ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: add-meeting-registrant
        method: POST
        description: Add a registrant to a meeting.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
          description: The meeting ID.
        body:
          type: json
          data:
            email: '{{tools.email}}'
            first_name: '{{tools.first_name}}'
            last_name: '{{tools.last_name}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: meeting-polls
      path: /meetings/{meetingId}/polls
      description: Manage meeting polls.
      operations:
      - name: list-meeting-polls
        method: GET
        description: List all polls for a meeting.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
          description: The meeting ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-meeting-poll
        method: POST
        description: Create a poll for a meeting.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
          description: The meeting ID.
        body:
          type: json
          data:
            title: '{{tools.title}}'
            questions: '{{tools.questions}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: meeting-participants
      path: /meetings/{meetingId}/participants
      description: Meeting participant operations.
      operations:
      - name: list-meeting-participants
        method: GET
        description: List participants of a live or past meeting.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
          description: The meeting ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: meeting-recordings
      path: /meetings/{meetingId}/recordings
      description: Meeting recording operations.
      operations:
      - name: get-meeting-recordings
        method: GET
        description: Get all recordings for a meeting.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
          description: The meeting ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-meeting-recordings
        method: DELETE
        description: Delete all recordings for a meeting.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
          description: The meeting ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: meeting-livestream
      path: /meetings/{meetingId}/livestream
      description: Live stream operations.
      operations:
      - name: update-meeting-livestream
        method: PATCH
        description: Update a meeting's live stream configuration.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
          description: The meeting ID.
        body:
          type: json
          data:
            stream_url: '{{tools.stream_url}}'
            stream_key: '{{tools.stream_key}}'
            page_url: '{{tools.page_url}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: past-meeting
      path: /past_meetings/{meetingId}
      description: Past meeting operations.
      operations:
      - name: get-past-meeting-details
        method: GET
        description: Get details of a past meeting.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
          description: The meeting UUID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: zoom-meeting-management-api
    description: Unified REST API for Zoom meeting lifecycle management.
    resources:
    - path: /v1/meetings
      name: meetings
      description: Meeting lifecycle management.
      operations:
      - method: GET
        name: list-meetings
        description: List all meetings for a user.
        call: zoom-meeting.list-meetings
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-meeting
        description: Create a new meeting.
        call: zoom-meeting.create-meeting
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meetings/{meetingId}
      name: meeting-details
      description: Individual meeting operations.
      operations:
      - method: GET
        name: get-meeting
        description: Get meeting details.
        call: zoom-meeting.get-meeting
        with:
          meetingId: rest.meetingId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: update-meeting
        description: Update a meeting.
        call: zoom-meeting.update-meeting
        with:
          meetingId: rest.meetingId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-meeting
        description: Delete a meeting.
        call: zoom-meeting.delete-meeting
        with:
          meetingId: rest.meetingId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/registrants
      name: registrants
      description: Meeting registration management.
      operations:
      - method: GET
        name: list-registrants
        description: List registrants for a meeting.
        call: zoom-meeting.list-meeting-registrants
        with:
          meetingId: rest.meetingId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: add-registrant
        description: Add a registrant to a meeting.
        call: zoom-meeting.add-meeting-registrant
        with:
          meetingId: rest.meetingId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/polls
      name: polls
      description: Meeting poll management.
      operations:
      - method: GET
        name: list-polls
        description: List polls for a meeting.
        call: zoom-meeting.list-meeting-polls
        with:
          meetingId: rest.meetingId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-poll
        description: Create a poll for a meeting.
        call: zoom-meeting.create-meeting-poll
        with:
          meetingId: rest.meetingId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/recordings
      name: recordings
      description: Meeting recording management.
      operations:
      - method: GET
        name: get-recordings
        description: Get recordings for a meeting.
        call: zoom-meeting.get-meeting-recordings
        with:
          meetingId: rest.meetingId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-recordings
        description: Delete recordings for a meeting.
        call: zoom-meeting.delete-meeting-recordings
        with:
          meetingId: rest.meetingId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: zoom-meeting-management-mcp
    transport: http
    description: MCP server for AI-assisted Zoom meeting lifecycle management.
    tools:
    - name: list-meetings
      description: List all meetings scheduled for a user.
      hints:
        readOnly: true
        openWorld: true
      call: zoom-meeting.list-meetings
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-meeting
      description: Create a new meeting for a user.
      hints:
        readOnly: false
      call: zoom-meeting.create-meeting
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-meeting
      description: Retrieve details of a specific meeting.
      hints:
        readOnly: true
      call: zoom-meeting.get-meeting
      with:
        meetingId: tools.meetingId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-meeting
      description: Update meeting details.
      hints:
        readOnly: false
        idempotent: true
      call: zoom-meeting.update-meeting
      with:
        meetingId: tools.meetingId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-meeting
      description: Delete a meeting permanently.
      hints:
        destructive: true
        idempotent: true
      call: zoom-meeting.delete-meeting
      with:
        meetingId: tools.meetingId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-registrants
      description: List all registrants for a meeting.
      hints:
        readOnly: true
      call: zoom-meeting.list-meeting-registrants
      with:
        meetingId: tools.meetingId
      outputParameters:
      - type: object
        mapping: $.
    - name: add-registrant
      description: Add a registrant to a meeting.
      hints:
        readOnly: false
      call: zoom-meeting.add-meeting-registrant
      with:
        meetingId: tools.meetingId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-polls
      description: List all polls for a meeting.
      hints:
        readOnly: true
      call: zoom-meeting.list-meeting-polls
      with:
        meetingId: tools.meetingId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-poll
      description: Create a poll for a meeting.
      hints:
        readOnly: false
      call: zoom-meeting.create-meeting-poll
      with:
        meetingId: tools.meetingId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-participants
      description: List participants of a live or past meeting.
      hints:
        readOnly: true
      call: zoom-meeting.list-meeting-participants
      with:
        meetingId: tools.meetingId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-recordings
      description: Get all recordings for a meeting.
      hints:
        readOnly: true
      call: zoom-meeting.get-meeting-recordings
      with:
        meetingId: tools.meetingId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-recordings
      description: Delete all recordings for a meeting.
      hints:
        destructive: true
        idempotent: true
      call: zoom-meeting.delete-meeting-recordings
      with:
        meetingId: tools.meetingId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-livestream
      description: Update a meeting's live stream configuration.
      hints:
        readOnly: false
        idempotent: true
      call: zoom-meeting.update-meeting-livestream
      with:
        meetingId: tools.meetingId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-past-meeting-details
      description: Get details of a past meeting.
      hints:
        readOnly: true
      call: zoom-meeting.get-past-meeting-details
      with:
        meetingId: tools.meetingId
      outputParameters:
      - type: object
        mapping: $.
