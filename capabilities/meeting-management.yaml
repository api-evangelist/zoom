naftiko: "1.0.0-alpha1"

info:
  label: "Zoom Meeting Management"
  description: "Unified workflow for managing the complete Zoom meeting lifecycle including scheduling, registrants, polls, participants, recordings, and live streaming. Used by meeting organizers, administrators, and automation tools."
  tags:
    - Zoom
    - Meetings
    - Video Conferencing
    - Collaboration
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      ZOOM_OAUTH_TOKEN: ZOOM_OAUTH_TOKEN

capability:
  consumes:
    - import: zoom-meeting
      location: ./shared/zoom-meeting.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: zoom-meeting-management-api
      description: "Unified REST API for Zoom meeting lifecycle management."
      resources:
        - path: /v1/meetings
          name: meetings
          description: "Meeting lifecycle management."
          operations:
            - method: GET
              name: list-meetings
              description: "List all meetings for a user."
              call: "zoom-meeting.list-meetings"
              with:
                userId: "rest.userId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-meeting
              description: "Create a new meeting."
              call: "zoom-meeting.create-meeting"
              with:
                userId: "rest.userId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/meetings/{meetingId}
          name: meeting-details
          description: "Individual meeting operations."
          operations:
            - method: GET
              name: get-meeting
              description: "Get meeting details."
              call: "zoom-meeting.get-meeting"
              with:
                meetingId: "rest.meetingId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-meeting
              description: "Update a meeting."
              call: "zoom-meeting.update-meeting"
              with:
                meetingId: "rest.meetingId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-meeting
              description: "Delete a meeting."
              call: "zoom-meeting.delete-meeting"
              with:
                meetingId: "rest.meetingId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/registrants
          name: registrants
          description: "Meeting registration management."
          operations:
            - method: GET
              name: list-registrants
              description: "List registrants for a meeting."
              call: "zoom-meeting.list-meeting-registrants"
              with:
                meetingId: "rest.meetingId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: add-registrant
              description: "Add a registrant to a meeting."
              call: "zoom-meeting.add-meeting-registrant"
              with:
                meetingId: "rest.meetingId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/polls
          name: polls
          description: "Meeting poll management."
          operations:
            - method: GET
              name: list-polls
              description: "List polls for a meeting."
              call: "zoom-meeting.list-meeting-polls"
              with:
                meetingId: "rest.meetingId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-poll
              description: "Create a poll for a meeting."
              call: "zoom-meeting.create-meeting-poll"
              with:
                meetingId: "rest.meetingId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/recordings
          name: recordings
          description: "Meeting recording management."
          operations:
            - method: GET
              name: get-recordings
              description: "Get recordings for a meeting."
              call: "zoom-meeting.get-meeting-recordings"
              with:
                meetingId: "rest.meetingId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-recordings
              description: "Delete recordings for a meeting."
              call: "zoom-meeting.delete-meeting-recordings"
              with:
                meetingId: "rest.meetingId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: zoom-meeting-management-mcp
      transport: http
      description: "MCP server for AI-assisted Zoom meeting lifecycle management."
      tools:
        - name: list-meetings
          description: "List all meetings scheduled for a user."
          hints:
            readOnly: true
            openWorld: true
          call: "zoom-meeting.list-meetings"
          with:
            userId: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-meeting
          description: "Create a new meeting for a user."
          hints:
            readOnly: false
          call: "zoom-meeting.create-meeting"
          with:
            userId: "tools.userId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-meeting
          description: "Retrieve details of a specific meeting."
          hints:
            readOnly: true
          call: "zoom-meeting.get-meeting"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-meeting
          description: "Update meeting details."
          hints:
            readOnly: false
            idempotent: true
          call: "zoom-meeting.update-meeting"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-meeting
          description: "Delete a meeting permanently."
          hints:
            destructive: true
            idempotent: true
          call: "zoom-meeting.delete-meeting"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-registrants
          description: "List all registrants for a meeting."
          hints:
            readOnly: true
          call: "zoom-meeting.list-meeting-registrants"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-registrant
          description: "Add a registrant to a meeting."
          hints:
            readOnly: false
          call: "zoom-meeting.add-meeting-registrant"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-polls
          description: "List all polls for a meeting."
          hints:
            readOnly: true
          call: "zoom-meeting.list-meeting-polls"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-poll
          description: "Create a poll for a meeting."
          hints:
            readOnly: false
          call: "zoom-meeting.create-meeting-poll"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-participants
          description: "List participants of a live or past meeting."
          hints:
            readOnly: true
          call: "zoom-meeting.list-meeting-participants"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-recordings
          description: "Get all recordings for a meeting."
          hints:
            readOnly: true
          call: "zoom-meeting.get-meeting-recordings"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-recordings
          description: "Delete all recordings for a meeting."
          hints:
            destructive: true
            idempotent: true
          call: "zoom-meeting.delete-meeting-recordings"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-livestream
          description: "Update a meeting's live stream configuration."
          hints:
            readOnly: false
            idempotent: true
          call: "zoom-meeting.update-meeting-livestream"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-past-meeting-details
          description: "Get details of a past meeting."
          hints:
            readOnly: true
          call: "zoom-meeting.get-past-meeting-details"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
