- type: Features
  data:
  - Basic free with 40-min meeting cap, 100 participants
  - Pro at $13.33/user/mo with 30-hr meetings, 5 GB cloud recording
  - Business at $18.33/user/mo with 300 participants, SSO, managed domains
  - Enterprise at $19.99/user/mo with unlimited cloud, 1,000 participants
  - Zoom Phone, Webinars, Events as add-ons
  - REST API tiered by Light/Medium/Heavy categories
  - 30/60/80 req/sec by category; 100K req/day per app
  - OAuth 2.0 (account-level and user-level)
  - Server-to-Server OAuth for backend apps
  - Webhooks via Marketplace Apps
  - Meeting SDK (Web/iOS/Android/Windows/macOS)
  - Video SDK for custom video apps
  - Chat API for team messaging
  - Phone API for cloud PBX
  - AI Companion for meeting summaries (Pro+)
  - Marketplace for distributable apps
  sources:
  - https://zoom.us/pricing
  updated: '2026-05-04'
- type: UseCases
  data:
  - name: Remote Work
    description: Enable distributed teams to collaborate effectively with video meetings,
      chat, and shared workspaces.
  - name: Telehealth
    description: Provide HIPAA-compliant virtual healthcare appointments with clinical
      note integration.
  - name: Virtual Events
    description: Host conferences, webinars, and large-scale events with registration
      and attendee engagement tools.
  - name: Education
    description: Deliver online classes and training sessions with breakout rooms,
      polling, and whiteboard collaboration.
  - name: Customer Support
    description: Build omnichannel contact centers with AI-powered virtual agents
      and quality management.
  - name: Sales Enablement
    description: Accelerate revenue with conversation intelligence, engagement scoring,
      and CRM integration.
- type: Integrations
  data:
  - name: Salesforce
    description: Sync meeting data, recordings, and conversation intelligence with
      Salesforce CRM.
  - name: Microsoft 365
    description: Integrate Zoom with Outlook calendar, Teams, and OneDrive for seamless
      scheduling.
  - name: Google Workspace
    description: Connect with Google Calendar, Gmail, and Google Drive for unified
      collaboration.
  - name: Slack
    description: Start Zoom meetings directly from Slack channels and receive meeting
      notifications.
  - name: HubSpot
    description: Automatically log meeting activities and conversation insights in
      HubSpot CRM.
  - name: Zapier
    description: Automate workflows between Zoom and 5,000+ apps with no-code integrations.
